<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon! - The Greek Directory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <link rel="icon" href="https://static.thegreekdirectory.org/img/logo/bluefavicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href=https://static.thegreekdirectory.org/img/logo/bluefavicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; font-family: 'Bitter', serif; }

    body {
      margin: 0;
      background: linear-gradient(135deg, #045093, #033b6d);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 3rem 2.5rem;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .logo { width: 120px; margin-bottom: 1.5rem; }

    h1 { font-size: 1.6rem; margin: 0 0 1rem; color: #212121; }

    p { font-size: 1.05rem; margin: 0 0 2rem; color: #444; line-height: 1.5; }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .buttons a,
    .buttons button {
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      font-family: 'Bitter', serif;
      background: #045093;
      color: white;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .buttons a:hover,
    .buttons button:hover {
      background: #04467f;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(135deg, #1a3a5a, #0d2540); }
      .container { background: #2a2a2a; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
      h1, p { color: #e5e5e5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://static.thegreekdirectory.org/img/logo/blue.png" alt="The Greek Directory logo" class="logo">
    <h1>Coming Soon!</h1>
    <p>The path <code id="requested-url" style="background-color: #eee; border: 1px solid #ccc; padding: 2px 4px; border-radius: 3px;"></code> is reserved by The Greek Directory for an upcoming feature. Stay tuned!</p>
    <div class="buttons">
      <button onclick="history.back()">Go Back</button>
      <a href="https://thegreekdirectory.org" onclick="window.location.replace('https://thegreekdirectory.org'); return false;">
        Go to The Greek Directory
      </a>
    </div>
  </div>
<script>
    const urlMap = {
        "e1": "event",
        "e2": "events",
        "n": "news",
        "b": "blog",
        "p1": "post",
        "p2": "posts",
        "r1": "resource",
        "r2": "resources",
        "pl1": "place",
        "pl2": "places",
        "cl": "claim"
    };
    const urlParams = new URLSearchParams(window.location.search);
    const firstKey = urlParams.keys().next().value;
    const queryValue = urlParams.get(firstKey);
    const displayName = urlMap[queryValue] || "Unknown Link";
    const urlElement = document.getElementById('requested-url');
    if (displayName === "Unknown Link") {
    window.location.replace("https://thegreekdirectory.org");
    }
    if (urlElement) {
        urlElement.textContent = "/" + displayName;
    }
</script>

    <script src="https://cdn.gtranslate.net/widgets/latest/globe.js" defer></script>
</body>
</html>
