        function parseHoursToMinutes(hoursText) {
            if (!hoursText || typeof hoursText !== 'string') return null;
            const value = hoursText.trim();
            if (!value || value.toLowerCase() === 'closed') return null;
            if (/24/.test(value.toLowerCase())) return { startMinutes: 0, endMinutes: 1439, overnight: false };

            const h24 = value.match(/^(\d{2}):(\d{2})\s*-\s*(\d{2}):(\d{2})$/);
            if (h24) {
                const startMinutes = parseInt(h24[1], 10) * 60 + parseInt(h24[2], 10);
                const endMinutes = parseInt(h24[3], 10) * 60 + parseInt(h24[4], 10);
                return { startMinutes, endMinutes, overnight: endMinutes < startMinutes };
            }

            const h12 = value.match(/(\d{1,2}):(\d{2})\s*(AM|PM)\s*-\s*(\d{1,2}):(\d{2})\s*(AM|PM)/i);
            if (!h12) return null;
            let [, sh, sm, sp, eh, em, ep] = h12;
            let start = parseInt(sh, 10);
            let end = parseInt(eh, 10);
            if (sp.toUpperCase() === 'PM' && start !== 12) start += 12;
            if (sp.toUpperCase() === 'AM' && start === 12) start = 0;
            if (ep.toUpperCase() === 'PM' && end !== 12) end += 12;
            if (ep.toUpperCase() === 'AM' && end === 12) end = 0;
            const startMinutes = start * 60 + parseInt(sm, 10);
            const endMinutes = end * 60 + parseInt(em, 10);
            return { startMinutes, endMinutes, overnight: endMinutes < startMinutes };
        }

        function updateOpenClosedBadge() {
            const badge = document.getElementById('openClosedBadge');
            const statusText = document.getElementById('openStatusText');
            const hasHours = hoursData && Object.values(hoursData).some(value => typeof value === 'string' && value.trim().length > 0);
            if (!hasHours) {
                if (badge) badge.style.display = 'none';
                if (statusText) statusText.style.display = 'none';
                return;
            }
            
            const now = new Date();
            const localNow = new Date(now.toLocaleString('en-US', { timeZone: businessTimezone }));
            const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            const today = days[localNow.getDay()];
            const todayHours = hoursData[today];
            
            if (!todayHours || todayHours.toLowerCase() === 'closed') {
                if (badge) {
                    badge.textContent = 'Closed Now';
                    badge.className = 'badge badge-closed';
                }
                if (statusText) {
                    statusText.textContent = 'Closed Now';
                    statusText.className = 'closed-now';
                }
                return;
            }
            
            if (todayHours.toLowerCase().includes('24') || todayHours.toLowerCase().includes('open 24')) {
                if (badge) {
                    badge.textContent = 'Open Now';
                    badge.className = 'badge badge-open';
                }
                if (statusText) {
                    statusText.textContent = 'Open 24 Hours';
                    statusText.className = 'open-now';
                }
                return;
            }
            
            /* Copyright (C) The Greek Directory, 2025-present. All rights reserved. */
            
            const parsed = parseHoursToMinutes(todayHours);
            if (!parsed) {
                if (badge) badge.style.display = 'none';
                if (statusText) statusText.style.display = 'none';
                return;
            }

            const currentMinutes = localNow.getHours() * 60 + localNow.getMinutes();
            const { startMinutes, endMinutes, overnight: isOvernight } = parsed;

            const isOpen = isOvernight
                ? (currentMinutes >= startMinutes || currentMinutes <= endMinutes)
                : (currentMinutes >= startMinutes && currentMinutes <= endMinutes);
            const minutesToOpen = startMinutes - currentMinutes;
            const minutesToClose = (isOvernight && currentMinutes <= endMinutes)
                ? endMinutes - currentMinutes
                : (isOvernight ? (24 * 60 - currentMinutes) + endMinutes : endMinutes - currentMinutes);

            if (!isOpen && minutesToOpen > 0 && minutesToOpen <= 60) {
                if (badge) {
                    badge.textContent = 'Opening Soon';
                    badge.className = 'badge badge-opening-soon';
                }
                if (statusText) {
                    statusText.textContent = 'Opening Soon';
                    statusText.className = 'open-now';
                }
                return;
            }

            if (isOpen && minutesToClose > 0 && minutesToClose <= 60) {
                if (badge) {
                    badge.textContent = 'Closing Soon';
                    badge.className = 'badge badge-closing-soon';
                }
                if (statusText) {
                    statusText.textContent = 'Closing Soon';
                    statusText.className = 'open-now';
                }
                return;
            }

            if (isOpen) {
                if (badge) {
                    badge.textContent = 'Open Now';
                    badge.className = 'badge badge-open';
                }
                if (statusText) {
                    statusText.textContent = 'Open Now';
                    statusText.className = 'open-now';
                }
            } else {
                if (badge) {
                    badge.textContent = 'Closed Now';
                    badge.className = 'badge badge-closed';
                }
                if (statusText) {
                    statusText.textContent = 'Closed Now';
                    statusText.className = 'closed-now';
                }
            }
        }

        function updateGallerySlide() {

            image.src = galleryPhotos[currentGalleryIndex];

        }

        function prevGallerySlide() {

                const carousel = document.getElementById('photoCarousel');
                if (!carousel) return;
                const current = parseInt(carousel.dataset.current || 0);
                goToSlide((current + 1) % totalSlides);

                const carousel = document.getElementById('photoCarousel');

                const current = parseInt(carousel.dataset.current || 0);
                goToSlide((current - 1 + totalSlides) % totalSlides);
            }

            window.goToSlide = goToSlide;
            window.nextSlide = nextSlide;
            window.prevSlide = prevSlide;
        }

        window.openGallery = openGallery;
        window.closeGallery = closeGallery;
        window.nextGallerySlide = nextGallerySlide;
        window.prevGallerySlide = prevGallerySlide;

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeGallery();
            }
        });

        function shareNative() {
            trackClick('share', 'native');
            if (navigator.share) {
                navigator.share({
                    title: businessName + ' | The Greek Directory',
                    text: 'Check out ' + businessName + ' on The Greek Directory!',
                    url: window.location.href.split('?')[0] + '?utm_source=native&utm_medium=share&utm_campaign=listing'
                }).catch(err => {
                    if (err.name !== 'AbortError') {
                        console.log('Share failed:', err);
                    }
                });
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('Link copied to clipboard!');
                }).catch(() => {
                    alert('Unable to share. Please copy the URL from your browser.');
                });
            }
        }

        /* Copyright (C) The Greek Directory, 2025-present. All rights reserved. */

        const coordinatesStr = '';
        const fullAddress = '';

        async function geocodeAddress(address) {
            try {
                const endpoint = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(address)}`;
                const response = await fetch(endpoint, { headers: { 'Accept': 'application/json' } });
                if (!response.ok) return null;
                const data = await response.json();
                if (!Array.isArray(data) || !data.length) return null;
                return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            } catch (_) {
                return null;
            }
        }
        
        async function initializeMap() {
            const mapFallback = document.getElementById('mapFallback');
            const showMapFallback = (message) => {
                if (mapFallback) {
                    mapFallback.textContent = message || 'Map is currently unavailable for this listing.';
                    mapFallback.classList.add('visible');
                }
                const locationSection = document.getElementById('locationSection');
                if (locationSection) locationSection.classList.add('map-unavailable');
            };

            if (!fullAddress || fullAddress === '') {
                showMapFallback('Map is unavailable because this listing does not include a mappable address.');
                return;
            }
            
            const mapElement = document.getElementById('listingMap');
            if (!mapElement) {
                return;
            }
            
            try {
                let lat;
                let lng;

                if (coordinatesStr && coordinatesStr.includes(',')) {
                    const coords = coordinatesStr.split(',');
                    lat = parseFloat(coords[0].trim());
                    lng = parseFloat(coords[1].trim());
                }

                if (isNaN(lat) || isNaN(lng)) {
                    const geocoded = await geocodeAddress(fullAddress);
                    if (!geocoded) {
                        showMapFallback('We could not load this map right now. Please use Directions for navigation.');
                        return;
                    }
                    [lat, lng] = geocoded;
                }
                
                if (typeof L === 'undefined') {
                    setTimeout(initializeMap, 500);
                    return;
                }
                
                const map = L.map('listingMap', {
                    center: [lat, lng],
                    zoom: 15,
                    zoomControl: true,
                    scrollWheelZoom: false
                });
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '',
                    maxZoom: 19
                }).addTo(map);
                
                L.marker([lat, lng]).addTo(map)
                    .bindPopup('<strong>Testing</strong><br>')
                    .openPopup();
                
                setTimeout(() => {
                    map.invalidateSize();
                }, 250);
                
                mapElement.addEventListener('click', function() {
                    this.classList.add('active');
                    map.scrollWheelZoom.enable();
                });

                mapElement.addEventListener('mouseleave', function() {
                    this.classList.remove('active');
                    map.scrollWheelZoom.disable();
                });
            } catch (e) {
                console.error('Map error:', e);
                showMapFallback('Map failed to load. Please try again later.');
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(initializeMap, 1000);
            });
        } else {
            setTimeout(initializeMap, 1000);
        }
        
        updateOpenClosedBadge();
        setInterval(updateOpenClosedBadge, 60000);
        
        /* Copyright (C) The Greek Directory, 2025-present. All rights reserved. */
    </script>
</body>
