<style>
.language-switch{--switch-width:90px;--switch-height:32px;--slider-size:24px;--us-blue:#192f5d;--gr-blue:#0d5eaf;display:inline-block}
.lang-input{display:none}
.lang-label{width:var(--switch-width);height:var(--switch-height);background-color:var(--us-blue);display:flex;align-items:center;justify-content:space-between;padding:0 8px;border-radius:50px;cursor:pointer;position:relative;transition:background-color .3s ease;box-sizing:border-box}
.toggle-slider{position:absolute;width:var(--slider-size);height:var(--slider-size);background:#fff;border-radius:50%;left:4px;display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:2}
.toggle-slider svg{width:14px;height:14px;fill:var(--us-blue)}
.flag-icon{width:24px;height:18px;display:flex;align-items:center;justify-content:center;z-index:1;opacity:.35;color:#fff;font-size:11px;font-weight:700}
.lang-en{opacity:1}
.lang-input:checked + .lang-label{background-color:var(--gr-blue)}
.lang-input:checked + .lang-label .toggle-slider{transform:translateX(calc(var(--switch-width) - var(--slider-size) - 8px))}
.lang-input:checked + .lang-label .lang-en{opacity:.35}
.lang-input:checked + .lang-label .lang-gr{opacity:1}
</style>

<header id="listingsHeader" class="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 z-40">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex items-center justify-between h-14">
            <!-- Logo -->
            <a href="/" class="flex items-center gap-2 flex-shrink-0" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">
                <img src="https://static.thegreekdirectory.org/img/logo/blue.svg" alt="The Greek Directory" class="h-8 w-auto">
                <span class="text-sm font-semibold text-gray-900 hidden sm:inline">The Greek Directory</span>
            </a>

            <!-- Full nav (shown when everything fits) -->
            <nav id="headerFullNav" class="flex items-center gap-1">
                <a href="/" id="navHome" class="px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Home</a>
                <a href="/listings" id="navListings" class="px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Listings</a>
                <a href="/about" id="navAbout" class="px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">About</a>
                <a href="/listings?starred=1"
                   id="headerStarBtn"
                   onclick="return window.tgdNavigateToStarred(event)"
                   class="px-2 py-1.5 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg"
                   title="View Starred"
                   style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#facc15" stroke="#ca8a04" stroke-width="1.5">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </a>
                <div class="language-switch" id="headerLanguageSwitch">
                    <input type="checkbox" id="lang-toggle" class="lang-input" aria-label="Toggle language">
                    <label for="lang-toggle" class="lang-label" title="Switch Language">
                        <div class="flag-icon lang-en">EN</div>
                        <div class="toggle-slider">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"></path></svg>
                        </div>
                        <div class="flag-icon lang-gr">GR</div>
                    </label>
                </div>
            </nav>

            <!-- Hamburger mode: star icon stays in header, hamburger opens dropdown -->
            <div id="headerHamburgerRow" class="hidden items-center gap-2">
                <a href="/listings?starred=1"
                   onclick="return window.tgdNavigateToStarred(event)"
                   class="p-1.5 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg"
                   title="View Starred"
                   style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#facc15" stroke="#ca8a04" stroke-width="1.5">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </a>
                <div class="language-switch">
                    <input type="checkbox" id="lang-toggle-mobile" class="lang-input" aria-label="Toggle language">
                    <label for="lang-toggle-mobile" class="lang-label" title="Switch Language">
                        <div class="flag-icon lang-en">EN</div>
                        <div class="toggle-slider"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"></path></svg></div>
                        <div class="flag-icon lang-gr">GR</div>
                    </label>
                </div>
                <button id="hamburgerBtn" class="p-1.5 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;" aria-label="Menu">
                    <svg id="hamburgerIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    <svg id="hamburgerCloseIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Hamburger dropdown panel -->
    <div id="hamburgerDropdown" class="hidden border-t border-gray-100 bg-white">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col gap-1">
            <a href="/" id="dropHome" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Home</a>
            <a href="/listings" id="dropListings" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Listings</a>
            <a href="/about" id="dropAbout" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">About</a>
            <div class="px-3 py-2">
                <div class="language-switch">
                    <input type="checkbox" id="lang-toggle-drop" class="lang-input" aria-label="Toggle language">
                    <label for="lang-toggle-drop" class="lang-label" title="Switch Language">
                        <div class="flag-icon lang-en">EN</div>
                        <div class="toggle-slider"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"></path></svg></div>
                        <div class="flag-icon lang-gr">GR</div>
                    </label>
                </div>
            </div>
        </div>
    </div>
</header>
<!-- Spacer to push content below the fixed header (h-14 = 56px) -->
<div style="height:56px;"></div>

<script>
(function initHeader() {
    // ── Active-tab highlighting ──
    var path = window.location.pathname;

    function isActive(href) {
        // Strip .html from both sides so /listings matches /listings.html and vice-versa
        var normPath = path.replace(/\.html$/, '');
        var hrefPath = href.split('?')[0].split('#')[0].replace(/\.html$/, '');
        if (hrefPath === '/') return normPath === '/';
        return normPath === hrefPath || normPath.startsWith(hrefPath + '/');
    }

    function applyActive(el, href) {
        if (!el) return;
        if (isActive(href)) {
            el.classList.remove('text-gray-600', 'hover:text-gray-900', 'hover:bg-gray-100');
            el.classList.add('font-semibold', 'text-white');
            el.style.backgroundColor = '#055193';
        }
    }

    applyActive(document.getElementById('navHome'),     '/');
    applyActive(document.getElementById('navListings'), '/listings');
    applyActive(document.getElementById('navAbout'),    '/about');
    applyActive(document.getElementById('dropHome'),     '/');
    applyActive(document.getElementById('dropListings'), '/listings');
    applyActive(document.getElementById('dropAbout'),    '/about');

    // ── Responsive hamburger ──
    var fullNav      = document.getElementById('headerFullNav');
    var hamburgerRow = document.getElementById('headerHamburgerRow');
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var hamburgerIcon      = document.getElementById('hamburgerIcon');
    var hamburgerCloseIcon = document.getElementById('hamburgerCloseIcon');
    var dropdown     = document.getElementById('hamburgerDropdown');
    var dropdownOpen = false;

    function measure() {
        fullNav.style.display = 'flex';
        hamburgerRow.style.display = 'none';

        var headerBar  = fullNav.closest('.flex.items-center.justify-between');
        var availWidth = headerBar.clientWidth;
        var logoEl     = headerBar.querySelector('a');
        var logoWidth  = logoEl.offsetWidth;
        var available  = availWidth - logoWidth - 32;
        var navNeeded  = fullNav.scrollWidth;

        if (navNeeded <= available) {
            fullNav.style.display = 'flex';
            hamburgerRow.style.display = 'none';
        } else {
            fullNav.style.display  = 'none';
            hamburgerRow.style.display = 'flex';
        }
    }

    function toggleDropdown() {
        dropdownOpen = !dropdownOpen;
        dropdown.classList.toggle('hidden', !dropdownOpen);
        hamburgerIcon.classList.toggle('hidden', dropdownOpen);
        hamburgerCloseIcon.classList.toggle('hidden', !dropdownOpen);
    }

    hamburgerBtn.addEventListener('click', toggleDropdown);

    document.addEventListener('click', function(e) {
        if (dropdownOpen && !hamburgerBtn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdownOpen = false;
            dropdown.classList.add('hidden');
            hamburgerIcon.classList.remove('hidden');
            hamburgerCloseIcon.classList.add('hidden');
        }
    });

    measure();
    window.addEventListener('resize', measure);

    // ── Starred navigation ──────────────────────────────────────────────

    function normalizeListingsPath(pathname) {
        // Strip .html extension and trailing slash so
        // /listings  /listings/  /listings.html  all match
        return pathname.replace(/\.html$/, '').replace(/\/$/, '');
    }

    function navigateToStarred(event) {
        event.preventDefault();

        var url      = new URL(window.location.href);
        var normPath = normalizeListingsPath(url.pathname);

        // Not on listings at all → hard navigate, preserving nothing
        if (normPath !== '/listings') {
            window.location.href = '/listings?starred=1';
            return false;
        }

        // On listings → inject starred=1 into existing params, no page reload
        url.searchParams.set('starred', '1');

        // Build new URL: preserve pathname, all existing + new params, and hash
        var qs     = url.searchParams.toString(); // always non-empty after .set()
        var newUrl = url.pathname + '?' + qs + (url.hash || '');

        history.replaceState({}, '', newUrl);

        updateStarredButtonState();
        window.dispatchEvent(new CustomEvent('tgd:starred-filter-requested'));
        if (typeof window.applyUrlFilters === 'function') {
            window.applyUrlFilters();
        }

        return false; // stops <a> default even when called via onclick=""
    }

    // Expose globally so onclick="return window.tgdNavigateToStarred(event)"
    // works even in the narrow window before the addEventListener wire-up below
    window.tgdNavigateToStarred = navigateToStarred;

    function updateStarredButtonState() {
        var active = new URL(window.location.href).searchParams.get('starred') === '1';
        starButtons.forEach(function(btn) {
            btn.style.backgroundColor = active ? '#fbbf24' : '';
            btn.style.color           = active ? '#78350f' : '';
        });
    }

    var starButtons = document.querySelectorAll('a[href="/listings?starred=1"]');
    starButtons.forEach(function(btn) {
        btn.addEventListener('click', navigateToStarred);
    });

    updateStarredButtonState();

    function setLanguage(lang) {
        localStorage.setItem('tgd_language', lang);
        if (window.PWAApp && typeof window.PWAApp.setLanguage === 'function') {
            window.PWAApp.setLanguage(lang, { persist: true, reload: false });
        }
        window.location.reload();
    }

    function bindLanguageToggle(id) {
        var toggle = document.getElementById(id);
        if (!toggle) return;
        var currentLanguage = localStorage.getItem('tgd_language') || 'en';
        toggle.checked = currentLanguage === 'el';
        toggle.addEventListener('change', function(e) {
            setLanguage(e.target.checked ? 'el' : 'en');
        });
    }

    bindLanguageToggle('lang-toggle');
    bindLanguageToggle('lang-toggle-mobile');
    bindLanguageToggle('lang-toggle-drop');

    window.addEventListener('popstate',                  updateStarredButtonState);
    window.addEventListener('tgd:starred-state-changed', updateStarredButtonState);
})();
</script>
