    <!-- PWA splash inline (avoids FOUC) -->

    .pwa-splash{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease,visibility .5s ease}

<body>
    <noscript>
      <style>
        .tgd-noscript-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.95);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:20px}

        .tgd-noscript-copy{color:#444;line-height:1.5}
        @media(prefers-color-scheme:dark){.tgd-noscript-overlay{background:rgba(17,24,39,.95)}.tgd-noscript-card{background:#111827;box-shadow:0 10px 25px rgba(0,0,0,.45)}.tgd-noscript-copy{color:#e5e7eb}}
      </style>
      <div class="tgd-noscript-overlay">

          <p class="tgd-noscript-copy">To experience the full functionality of <strong>TGD</strong>, please enable JavaScript in your browser settings.</p>
        </div>
      </div>
    </noscript>

    <!-- Header -->
    <div data-partial="header"></div>

    <!-- Hero Section -->
    <section class="hero" aria-label="Search Greek-owned businesses">
        <div class="hero-inner">
            <div class="hero-content">
                <div class="hero-eyebrow">The Greek Directory</div>
                <h1 class="hero-title">The Greek Directory — Discover Greek-Owned Businesses Across America</h1>
                <p class="hero-subtitle">From family restaurants to professional services — find the Greek business community near you.</p>

                <div class="search-wrapper" role="search">
                    <div class="search-bar-container">
                        <svg class="search-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"/>
                            <path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
                        </svg>
                        <input
                            type="search"
                            id="mainSearch"
                            class="search-bar-input"
                            placeholder="Search businesses, categories, or locations…"
                            autocomplete="off"
                            autocorrect="off"
                            spellcheck="false"
                            aria-label="Search Greek-owned businesses"
                        >
                        <button onclick="performSearch()" class="search-bar-btn" aria-label="Search">
                            <span class="search-btn-text">Search</span>
                            <svg class="search-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                                <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div id="searchDropdown" class="search-dropdown hidden" role="listbox" aria-label="Search suggestions"></div>
                </div>

                <div class="hero-chips" aria-label="Browse by category">
                    <button onclick="searchByCategory('Food &amp; Hospitality')" class="hero-chip">
                        <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2" stroke-linecap="round"/>
                            <path d="M7 2v20M21 15a2 2 0 00-2-2H5" stroke-linecap="round"/>
                            <path d="M21 6c0 3.314-4 6-4 6s-4-2.686-4-6a4 4 0 018 0z"/>
                        </svg>
                        Restaurants
                    </button>
                    <button onclick="searchByCategory('Church &amp; Religious Organization')" class="hero-chip">
                        <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M12 2v4M10 4h4" stroke-linecap="round"/>
                            <path d="M8 8h8l2 12H6L8 8z"/>
                            <path d="M10 20v-5a2 2 0 014 0v5" stroke-linecap="round"/>
                        </svg>
                        Churches
                    </button>
                    <button onclick="searchByCategory('Professional &amp; Business Services')" class="hero-chip">
                        <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <rect x="2" y="7" width="20" height="14" rx="2"/>
                            <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke-linecap="round"/>
                            <path d="M12 12v3M10 13h4" stroke-linecap="round"/>
                        </svg>
                        Professional Services
                    </button>
                    <button onclick="searchByCategory('Education &amp; Community')" class="hero-chip">
                        <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M12 3L2 8l10 5 10-5-10-5z"/>
                            <path d="M2 8v8M22 8v8" stroke-linecap="round"/>
                            <path d="M6 10.5v5a6 6 0 0012 0v-5" stroke-linecap="round"/>
                        </svg>
                        Greek Schools
                    </button>
                    <button onclick="searchByCategory('Grocery &amp; Imports')" class="hero-chip">
                        <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                            <path d="M3 6h18" stroke-linecap="round"/>
                            <path d="M16 10a4 4 0 01-8 0" stroke-linecap="round"/>
                        </svg>
                        Markets
                    </button>
                </div>
            </div>
        </div>
    </section>

                <h2 class="section-title">Featured Businesses</h2>
                <a href="/listings" class="section-link">View all listings →</a>
            </div>
            <div class="listings-grid" id="featuredListings"></div>
        </div>
    </section>

    <section class="recent-section" id="recentSection">
